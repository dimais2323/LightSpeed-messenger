<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Light Speed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a1a;color:#fff;height:100vh;overflow:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fadeIn{animation:fadeIn .3s}
.slideUp{animation:slideUp .3s}

.authScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;display:flex;align-items:center;justify-content:center;z-index:1000}
.authScreen.hidden{display:none}
.authBox{background:#111133;border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px;width:400px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.authLogo{font-size:32px;font-weight:800;text-align:center;background:linear-gradient(135deg,#00d4ff,#7b2fff,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.authSub{text-align:center;color:rgba(255,255,255,.6);margin-bottom:30px;font-size:14px}
.tabs{display:flex;gap:10px;margin-bottom:25px}
.tab{flex:1;padding:10px;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);border-radius:8px;cursor:pointer;transition:.3s;font-family:inherit}
.tab.active{background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(123,47,255,.2));border-color:#00d4ff;color:#fff}
.inp{margin-bottom:16px}
.inp label{display:block;color:rgba(255,255,255,.7);margin-bottom:6px;font-size:13px}
.inp input,.inp textarea{width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-family:inherit;font-size:14px;outline:none;resize:vertical}
.inp input:focus,.inp textarea:focus{border-color:#00d4ff}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#00d4ff,#7b2fff);border:none;border-radius:12px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit;transition:.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,212,255,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn.small{padding:8px 16px;font-size:13px;width:auto}
.btn.danger{background:linear-gradient(135deg,#ff4444,#ff6600)}
.err{color:#ff4444;font-size:13px;text-align:center;margin-top:10px;min-height:20px}

.messenger{display:none;height:100vh}
.messenger.active{display:flex}
.sidebar{width:340px;min-width:340px;background:#111133;border-right:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column}
.sideH{padding:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sideLogo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#00d4ff,#7b2fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.sideLogo span{font-size:12px;color:rgba(255,255,255,.4);cursor:pointer}
.searchInp{width:100%;padding:10px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-family:inherit;font-size:13px;outline:none}
.chatList{flex:1;overflow-y:auto;padding:8px}
.chatList::-webkit-scrollbar{width:4px}
.chatList::-webkit-scrollbar-thumb{background:#00d4ff;border-radius:2px}
.chatItem{display:flex;align-items:center;padding:10px 12px;border-radius:12px;cursor:pointer;margin-bottom:2px;transition:.2s}
.chatItem:hover{background:rgba(255,255,255,.05)}
.chatItem.active{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(123,47,255,.15))}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;margin-right:12px;flex-shrink:0;background-size:cover;background-position:center;position:relative}
.onlineDot{width:10px;height:10px;border-radius:50%;background:#00ff88;position:absolute;bottom:2px;right:2px;border:2px solid #111133}
.chatInfo{flex:1;min-width:0;overflow:hidden}
.chatName{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chatPrev{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{background:linear-gradient(135deg,#00d4ff,#7b2fff);color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;min-width:22px;text-align:center}
.sideFoot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between}
.iconBtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.05);border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.iconBtn:hover{background:rgba(255,255,255,.1);color:#fff}
.userMini{display:flex;align-items:center;gap:8px;cursor:pointer}

.main{flex:1;display:flex;flex-direction:column;min-width:0;background:#0a0a1a;position:relative}
.chatHead{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px;background:#111133;flex-shrink:0}
.chatHeadInfo{flex:1;cursor:pointer;min-width:0}
.chatHeadName{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chatHeadStatus{font-size:12px;color:#00d4ff;margin-top:2px}

/* Messages area with custom scroll buttons */
.msgsWrapper{flex:1;position:relative;overflow:hidden}
.msgs{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:0;display:none}
.msgs{scrollbar-width:none;-ms-overflow-style:none}

/* Scroll buttons */
.scrollBtns{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:4px;z-index:10;opacity:0;transition:opacity .3s}
.msgsWrapper:hover .scrollBtns{opacity:1}
.scrollBtn{width:32px;height:32px;border-radius:50%;background:rgba(0,212,255,.2);border:1px solid rgba(0,212,255,.3);color:#00d4ff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;backdrop-filter:blur(10px)}
.scrollBtn:hover{background:rgba(0,212,255,.4);color:#fff;transform:scale(1.1)}
.scrollBtn:active{transform:scale(.95)}

.msg{max-width:70%;animation:slideUp .3s;flex-shrink:0}
.msg.sent{align-self:flex-end}
.msg.recv{align-self:flex-start}
.msgBubble{padding:10px 14px;border-radius:18px;word-wrap:break-word;overflow-wrap:break-word}
.msg.sent .msgBubble{background:linear-gradient(135deg,#00d4ff,#7b2fff);border-bottom-right-radius:6px}
.msg.recv .msgBubble{background:#1a1a40;border-bottom-left-radius:6px}
.msgText{color:#fff;font-size:14px;line-height:1.5;word-break:break-word}
.msgMeta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;text-align:right}
.msgImg{max-width:250px;max-height:300px;border-radius:12px;cursor:pointer;margin-bottom:6px;display:block;object-fit:cover}
.msgVid{max-width:250px;max-height:300px;border-radius:12px}
.msgAud{width:220px;margin-bottom:4px}

.inputRow{position:relative;flex-shrink:0}
.inputBar{padding:12px 16px;display:flex;gap:8px;align-items:flex-end;background:#111133;border-top:1px solid rgba(255,255,255,.1)}
.msgInput{flex:1;padding:10px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;color:#fff;font-family:inherit;font-size:14px;outline:none;resize:none;min-height:42px;max-height:100px;overflow-y:auto}
.msgInput:focus{border-color:#00d4ff}
.sendBtn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#7b2fff);border:none;color:#fff;cursor:pointer;font-size:18px;flex-shrink:0;transition:.2s}
.sendBtn:hover{transform:scale(1.1)}

.emojiPick{display:none;position:absolute;bottom:70px;right:16px;background:#1a1a40;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:8px;z-index:100;flex-wrap:wrap;gap:4px;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.4);max-height:200px;overflow-y:auto}
.emojiPick.show{display:flex}
.emojiItem{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:.2s;flex-shrink:0}
.emojiItem:hover{background:rgba(255,255,255,.1);transform:scale(1.2)}

.attachMenu{display:none;position:absolute;bottom:70px;left:16px;background:#1a1a40;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:8px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.attachMenu.show{display:block}
.attachOpt{padding:10px 16px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:8px;transition:.2s}
.attachOpt:hover{background:rgba(255,255,255,.1)}

.modalOver{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modalOver.show{display:flex}
.modal{background:#111133;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;width:90%;max-width:450px;max-height:85vh;overflow-y:auto;animation:slideUp .3s}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:#00d4ff;border-radius:2px}
.modal h3{font-size:20px;margin-bottom:20px;text-align:center}
.modalClose{float:right;background:none;border:none;color:rgba(255,255,255,.6);font-size:24px;cursor:pointer}
.modalClose:hover{color:#fff}
.noChat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.3);gap:12px}
.noChatIcon{font-size:60px}
.hidden{display:none}

.memberItem{display:flex;align-items:center;padding:10px 12px;border-radius:10px;gap:10px;cursor:pointer;transition:.2s;justify-content:space-between}
.memberItem:hover{background:rgba(255,255,255,.05)}
.memberLeft{display:flex;align-items:center;gap:10px}
.memberName{font-size:14px;font-weight:500}
.memberRole{font-size:11px;color:rgba(255,255,255,.4)}
.roleBadge{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(0,212,255,.2);color:#00d4ff}
.roleBadge.admin{background:rgba(255,170,0,.2);color:#ffaa00}
.roleBadge.owner{background:rgba(123,47,255,.2);color:#7b2fff}

@media(max-width:768px){
.sidebar{position:absolute;z-index:10;height:100%;display:none}
.sidebar.show{display:flex;width:100%}
.msg{max-width:85%}
}
</style>
</head>
<body>

<div class="authScreen" id="authScreen">
<div class="authBox">
<div class="authLogo">⚡ Light Speed</div>
<div class="authSub">Мгновенные сообщения</div>
<div class="tabs">
<button class="tab active" onclick="switchTab('login')">Вход</button>
<button class="tab" onclick="switchTab('register')">Регистрация</button>
</div>
<form id="authForm" onsubmit="return handleAuth(event)">
<div id="loginFields">
<div class="inp"><label>Имя</label><input type="text" id="loginUser" required></div>
<div class="inp"><label>Пароль</label><input type="password" id="loginPass" required></div>
</div>
<div id="registerFields" style="display:none">
<div class="inp"><label>Имя (3-20 символов)</label><input type="text" id="regUser" required></div>
<div class="inp"><label>Пароль (мин 6 символов)</label><input type="password" id="regPass" required></div>
</div>
<button type="submit" class="btn" id="authBtn">Войти</button>
</form>
<div class="err" id="errMsg"></div>
</div>
</div>

<div class="messenger" id="messenger">
<div class="sidebar" id="sidebar">
<div class="sideH">
<div class="sideLogo">⚡ Light Speed <span onclick="openModal('createChatModal')">+ Создать</span></div>
<input class="searchInp" placeholder="🔍 Поиск пользователей..." oninput="doSearch()" id="searchBox">
</div>
<div class="chatList" id="chatList"></div>
<div class="sideFoot">
<div class="userMini" onclick="openMyProfile()">
<div class="avatar" id="miniAvatar" style="width:32px;height:32px;font-size:12px"></div>
<span style="font-size:13px;font-weight:500" id="miniName"></span>
</div>
<div style="display:flex;gap:4px">
<button class="iconBtn" onclick="openModal('joinChatModal')" title="Войти в чат">🔗</button>
<button class="iconBtn" onclick="logout()" title="Выйти">🚪</button>
</div>
</div>
</div>

<div class="main" id="mainChat">
<div class="noChat" id="noChat"><div class="noChatIcon">💬</div><div style="font-size:18px;font-weight:600">Выберите чат</div><div style="font-size:13px">Или найдите пользователя через поиск</div></div>
<div id="chatArea" style="display:none;flex:1;flex-direction:column">
<div class="chatHead">
<button class="iconBtn" onclick="toggleSidebar()">☰</button>
<div class="avatar" id="chatAvatar" style="cursor:pointer" onclick="openChatProfile()"></div>
<div class="chatHeadInfo" onclick="openChatProfile()"><div class="chatHeadName" id="chatTitle"></div><div class="chatHeadStatus" id="chatStatus"></div></div>
</div>
<div class="msgsWrapper">
<div class="msgs" id="msgsContainer"></div>
<div class="scrollBtns">
<button class="scrollBtn" onclick="scrollMsgs(-200)" title="Вверх">▲</button>
<button class="scrollBtn" onclick="scrollMsgs(200)" title="Вниз">▼</button>
<button class="scrollBtn" onclick="scrollMsgs(-99999)" title="В начало">⏫</button>
<button class="scrollBtn" onclick="scrollMsgs(99999)" title="В конец">⏬</button>
</div>
</div>
<div class="inputRow">
<div class="emojiPick" id="emojiPick"></div>
<div class="attachMenu" id="attachMenu">
<div class="attachOpt" onclick="uploadMedia('photo')">🖼️ Фото</div>
<div class="attachOpt" onclick="uploadMedia('video')">🎬 Видео</div>
<div class="attachOpt" onclick="recordVoice()">🎤 Голосовое</div>
</div>
<div class="inputBar">
<button class="iconBtn" onclick="toggleAttach()">📎</button>
<textarea class="msgInput" id="msgInput" placeholder="Сообщение..." rows="1" onkeydown="onKeyDown(event)" oninput="onTyping();autoResize(this)"></textarea>
<button class="iconBtn" onclick="toggleEmoji()">😊</button>
<button class="sendBtn" onclick="sendMsg()">➤</button>
</div>
</div>
</div>
</div>
</div>

<!-- Profile Modal -->
<div class="modalOver" id="profileModal"><div class="modal">
<button class="modalClose" onclick="closeModal('profileModal')">✕</button>
<h3 id="profileModalTitle">👤 Профиль</h3>
<div style="text-align:center;margin-bottom:16px">
<div class="avatar" id="profileAvatar" style="width:80px;height:80px;font-size:32px;margin:0 auto;cursor:pointer"></div>
<div style="font-size:20px;font-weight:600;margin-top:10px" id="profileName"></div>
<div style="color:rgba(255,255,255,.5);font-size:13px" id="profileStatus"></div>
</div>
<div id="profileEditFields">
<div class="inp"><label>О себе</label><textarea id="profileBio" rows="2"></textarea></div>
<div class="inp"><label>Телефон</label><input id="profilePhone"></div>
<button class="btn" onclick="saveProfile()">Сохранить</button>
</div>
<div id="profileViewFields" style="display:none">
<div class="inp"><label>О себе</label><div style="padding:12px;background:rgba(255,255,255,.05);border-radius:12px" id="profileBioView">-</div></div>
<button class="btn" onclick="startChatWithProfile()" style="margin-top:8px">💬 Написать</button>
</div>
</div></div>

<!-- Chat Profile Modal -->
<div class="modalOver" id="chatProfileModal"><div class="modal">
<button class="modalClose" onclick="closeModal('chatProfileModal')">✕</button>
<h3 id="chatProfileTitle">📱 Информация</h3>
<div style="text-align:center;margin-bottom:16px">
<div class="avatar" id="chatProfileAvatar" style="width:80px;height:80px;font-size:32px;margin:0 auto"></div>
<div style="font-size:20px;font-weight:600;margin-top:10px" id="chatProfileName"></div>
<div style="color:rgba(255,255,255,.5);font-size:13px" id="chatProfileDesc"></div>
<div style="color:#00d4ff;font-size:12px;margin-top:4px" id="chatInviteCode"></div>
</div>
<div style="font-weight:600;margin-bottom:8px">Участники:</div>
<div id="chatMembersList"></div>
<button class="btn danger small" id="leaveChatBtn" style="margin-top:12px;display:none" onclick="leaveChat()">🚪 Выйти из чата</button>
</div></div>

<!-- Create Chat Modal -->
<div class="modalOver" id="createChatModal"><div class="modal">
<button class="modalClose" onclick="closeModal('createChatModal')">✕</button>
<h3>✨ Создать чат</h3>
<div class="inp"><input id="chatNameInp" placeholder="Название чата..."></div>
<div style="margin-bottom:12px"><label><input type="checkbox" id="chatPrivate"> Приватный (по коду)</label></div>
<button class="btn" onclick="createChat()">Создать</button>
<div id="inviteCode" style="text-align:center;color:#00d4ff;margin-top:12px;font-weight:600;display:none"></div>
</div></div>

<!-- Join Chat Modal -->
<div class="modalOver" id="joinChatModal"><div class="modal">
<button class="modalClose" onclick="closeModal('joinChatModal')">✕</button>
<h3>🔗 Войти в чат</h3>
<div class="inp"><input id="inviteCodeInp" placeholder="Введите код приглашения..."></div>
<button class="btn" onclick="joinChat()">Войти</button>
</div></div>

<input type="file" id="mediaInput" class="hidden" accept="image/*,video/*" onchange="onMediaUpload(event)">
<input type="file" id="avatarInput" class="hidden" accept="image/*" onchange="onAvatarUpload(event)">

<script src="/socket.io/socket.io.js"></script>
<script>
let token=localStorage.getItem('token')||'';
let user=JSON.parse(localStorage.getItem('user')||'null');
let socket,selChat,onlineUsers=new Set,unread={},recording=false,mediaRecorder,audioChunks=[];
const API='https://dimais2323.github.io/LightSpeed-messenger';
const EMOJIS='😀😂🥰😍🤩😎🥳😇🤗😤😢😭💀👍❤️🔥✨🎉🎮🚀🌈🍕🎤📸💯⭐'.split('');

EMOJIS.forEach(e=>{
const s=document.createElement('span');s.className='emojiItem';s.textContent=e;
s.onclick=()=>{const inp=document.getElementById('msgInput');inp.value+=e;inp.focus();};
document.getElementById('emojiPick').appendChild(s);
});

function switchTab(t){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
event.target.classList.add('active');
const isLogin=t==='login';
document.getElementById('loginFields').style.display=isLogin?'block':'none';
document.getElementById('registerFields').style.display=isLogin?'none':'block';
document.getElementById('authBtn').textContent=isLogin?'Войти':'Зарегистрироваться';
}

function showErr(m){const el=document.getElementById('errMsg');el.textContent=m;setTimeout(()=>el.textContent='',3000);}

async function handleAuth(e){
e.preventDefault();
const btn=document.getElementById('authBtn'),isLogin=btn.textContent==='Войти';
const username=(isLogin?document.getElementById('loginUser'):document.getElementById('regUser')).value.trim();
const password=(isLogin?document.getElementById('loginPass'):document.getElementById('regPass')).value.trim();
if(!username||!password)return showErr('Заполните все поля');
btn.disabled=true;
try{
const res=await fetch(API+'/api/'+(isLogin?'login':'register'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
const data=await res.json();
if(res.ok){token=data.token;user=data.user;localStorage.setItem('token',token);localStorage.setItem('user',JSON.stringify(user));initApp();}
else showErr(data.error);
}catch(e){showErr('Ошибка соединения');}
btn.disabled=false;
return false;
}

function initApp(){
document.getElementById('authScreen').classList.add('hidden');
document.getElementById('messenger').classList.add('active');
updateMiniProfile();
connectSocket();
loadChats();
}

function updateMiniProfile(){
const a=document.getElementById('miniAvatar');
a.style.background=user.avatar_color;a.style.backgroundImage='';a.textContent=user.username[0].toUpperCase();
document.getElementById('miniName').textContent=user.username;
if(user.avatar_url){a.style.backgroundImage=`url(${user.avatar_url})`;a.textContent='';}
}

function connectSocket(){
socket=io(API,{auth:{token}});
socket.on('connect',()=>console.log('✅'));
socket.on('online_users',ids=>{onlineUsers=new Set(ids);loadChats();});
socket.on('user_status',d=>{d.online?onlineUsers.add(d.userId):onlineUsers.delete(d.userId);loadChats();});
socket.on('new_message',m=>{
if(selChat&&selChat.type==='user'&&(m.sender_id===selChat.id||m.receiver_id===selChat.id))addMsg(m);
else if(m.sender_id!==user.id){unread[m.sender_id]=(unread[m.sender_id]||0)+1;loadChats();}
});
socket.on('chat_message',m=>{
if(selChat&&selChat.type==='chat'&&selChat.id===m.chat_id)addMsg({...m,sender_username:m.sender_username});
});
socket.on('user_typing',d=>{if(selChat&&selChat.type==='user'&&selChat.id===d.userId)document.getElementById('chatStatus').textContent='печатает...';});
socket.on('user_stop_typing',()=>{if(selChat)updateChatStatus();});
}

async function loadChats(){
const list=document.getElementById('chatList');list.innerHTML='';
try{
const res=await fetch(API+'/api/chats',{headers:{'Authorization':'Bearer '+token}});
const d=await res.json();
if(d.users)d.users.forEach(u=>{
const on=onlineUsers.has(u.id),un=unread[u.id]||0;
const item=document.createElement('div');
item.className='chatItem'+(selChat&&selChat.type==='user'&&selChat.id===u.id?' active':'');
item.onclick=()=>selectUser(u);
item.innerHTML=`<div class="avatar" style="background:${u.avatar_color};${u.avatar_url?'background-image:url('+u.avatar_url+');background-size:cover':''}">${u.avatar_url?'':u.username[0].toUpperCase()}${on?'<div class="onlineDot"></div>':''}</div><div class="chatInfo"><div class="chatName">${u.username}</div><div class="chatPrev">${u.last_msg||(on?'В сети':'Не в сети')}</div></div>${un?`<div class="badge">${un}</div>`:''}`;
list.appendChild(item);
});
if(d.groups)d.groups.forEach(c=>{
const item=document.createElement('div');
item.className='chatItem'+(selChat&&selChat.type==='chat'&&selChat.id===c.id?' active':'');
item.onclick=()=>selectChat(c);
item.innerHTML=`<div class="avatar" style="background:${c.avatar_color}">${c.name[0].toUpperCase()}</div><div class="chatInfo"><div class="chatName">${c.name} ${c.type==='channel'?'📢':''}</div><div class="chatPrev">${c.members_count||0} участников</div></div>`;
list.appendChild(item);
});
}catch(e){}
}

function doSearch(){
const q=document.getElementById('searchBox').value.trim();
if(!q)return loadChats();
fetch(API+'/api/users/search?q='+encodeURIComponent(q),{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json()).then(d=>{
const list=document.getElementById('chatList');list.innerHTML='';
if(d.users)d.users.forEach(u=>{
const item=document.createElement('div');item.className='chatItem';item.onclick=()=>selectUser(u);
item.innerHTML=`<div class="avatar" style="background:${u.avatar_color};${u.avatar_url?'background-image:url('+u.avatar_url+');background-size:cover':''}">${u.avatar_url?'':u.username[0].toUpperCase()}</div><div class="chatInfo"><div class="chatName">${u.username}</div></div>`;
list.appendChild(item);
});
});
}

function selectUser(u){
selChat={...u,type:'user'};
openChatView();
document.getElementById('chatTitle').textContent=u.username;
const a=document.getElementById('chatAvatar');a.style.background=u.avatar_color;a.style.backgroundImage='';a.textContent=u.username[0].toUpperCase();
if(u.avatar_url){a.style.backgroundImage=`url(${u.avatar_url})`;a.textContent='';}
updateChatStatus();unread[u.id]=0;loadChats();loadMsgs(u.id);
if(socket)socket.emit('mark_read',u.id);
}

function selectChat(c){
selChat={...c,type:'chat'};
openChatView();
document.getElementById('chatTitle').textContent=c.name;
const a=document.getElementById('chatAvatar');a.style.background=c.avatar_color;a.style.backgroundImage='';a.textContent=c.name[0].toUpperCase();
document.getElementById('chatStatus').textContent=(c.members_count||0)+' участников';
loadChats();loadChatMsgs(c.id);
}

function openChatView(){
document.getElementById('noChat').style.display='none';
document.getElementById('chatArea').style.display='flex';
document.getElementById('msgsContainer').innerHTML='';
}

function updateChatStatus(){
if(selChat?.type==='user')document.getElementById('chatStatus').textContent=onlineUsers.has(selChat.id)?'В сети':'Не в сети';
}

async function loadMsgs(uid){
try{
const r=await fetch(API+'/api/messages/'+uid,{headers:{'Authorization':'Bearer '+token}});
const d=await r.json();document.getElementById('msgsContainer').innerHTML='';
if(d.messages)d.messages.forEach(addMsg);scrollBottom();
}catch(e){}
}

async function loadChatMsgs(cid){
try{
const r=await fetch(API+'/api/chats/'+cid+'/messages',{headers:{'Authorization':'Bearer '+token}});
const d=await r.json();document.getElementById('msgsContainer').innerHTML='';
if(d.messages)d.messages.forEach(m=>addMsg({...m,sender_username:m.username}));scrollBottom();
}catch(e){}
}

function addMsg(m){
const c=document.getElementById('msgsContainer'),sent=m.sender_id===user.id,t=m.type||'text';
const div=document.createElement('div');div.className=`msg ${sent?'sent':'recv'} slideUp`;
let h='';
if(t==='image'&&m.file_url)h+=`<img src="${m.file_url}" class="msgImg" loading="lazy" onclick="window.open('${m.file_url}')" onerror="this.style.display='none'">`;
else if(t==='video'&&m.file_url)h+=`<video src="${m.file_url}" class="msgVid" controls></video>`;
else if(t==='voice'&&m.file_url)h+=`<audio src="${m.file_url}" class="msgAud" controls></audio>`;
if(m.content)h+=`<div class="msgText">${esc(m.content)}</div>`;
const time=new Date(m.timestamp).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
div.innerHTML=`<div class="msgBubble">${!sent&&m.sender_username?`<div style="font-size:11px;color:#00d4ff;margin-bottom:4px">${m.sender_username}</div>`:''}${h}<div class="msgMeta">${time}${sent?' ✓':''}</div></div>`;
c.appendChild(div);scrollBottom();
}

function sendMsg(){
if(!socket||!selChat)return;
const inp=document.getElementById('msgInput'),txt=inp.value.trim();
if(!txt)return;
if(selChat.type==='user')socket.emit('private_message',{receiverId:selChat.id,content:txt,type:'text'});
else socket.emit('chat_message',{chatId:selChat.id,content:txt,type:'text'});
inp.value='';inp.style.height='42px';hideMenus();
}

function onKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function onTyping(){if(socket&&selChat?.type==='user'){socket.emit('typing',{receiverId:selChat.id});clearTimeout(window._tt);window._tt=setTimeout(()=>socket.emit('stop_typing',{receiverId:selChat.id}),2000);}}
function autoResize(el){el.style.height='42px';el.style.height=Math.min(el.scrollHeight,100)+'px';}

// Scroll arrows
function scrollMsgs(amount){
const c=document.getElementById('msgsContainer');
if(c)c.scrollBy({top:amount,behavior:'smooth'});
}

function uploadMedia(type){const inp=document.getElementById('mediaInput');inp.accept=type==='photo'?'image/*':'video/*';inp.click();hideMenus();}
async function onMediaUpload(e){
const file=e.target.files[0];if(!file||!selChat)return;
const r=new FileReader();r.onload=async()=>{
const res=await fetch(API+'/api/upload',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({file:r.result,type:file.type.startsWith('image')?'photo':'video'})});
const d=await res.json(),mt=file.type.startsWith('image')?'image':'video';
if(selChat.type==='user')socket.emit('private_message',{receiverId:selChat.id,content:'',type:mt,fileUrl:d.url,fileName:file.name});
else socket.emit('chat_message',{chatId:selChat.id,content:'',type:mt,fileUrl:d.url,fileName:file.name});
};r.readAsDataURL(file);e.target.value='';
}

async function recordVoice(){
hideMenus();
if(recording){mediaRecorder.stop();recording=false;return;}
try{
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder=new MediaRecorder(stream);audioChunks=[];
mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
mediaRecorder.onstop=async()=>{
const blob=new Blob(audioChunks,{type:'audio/webm'}),r=new FileReader();
r.onload=async()=>{
const res=await fetch(API+'/api/upload',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({file:r.result,type:'voice'})});
const d=await res.json();
if(selChat?.type==='user')socket.emit('private_message',{receiverId:selChat.id,content:'🎤 Голосовое',type:'voice',fileUrl:d.url});
else if(selChat?.type==='chat')socket.emit('chat_message',{chatId:selChat.id,content:'🎤 Голосовое',type:'voice',fileUrl:d.url});
};r.readAsDataURL(blob);stream.getTracks().forEach(t=>t.stop());
};
mediaRecorder.start();recording=true;
setTimeout(()=>{if(recording){mediaRecorder.stop();recording=false;}},60000);
}catch(e){alert('Нет доступа к микрофону');}
}

async function onAvatarUpload(e){
const file=e.target.files[0];if(!file)return;
const r=new FileReader();r.onload=async()=>{
const res=await fetch(API+'/api/avatar',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({image:r.result})});
const d=await res.json();user.avatar_url=d.url;localStorage.setItem('user',JSON.stringify(user));updateMiniProfile();
};r.readAsDataURL(file);
}

function openMyProfile(){
document.getElementById('profileModalTitle').textContent='👤 Мой профиль';
document.getElementById('profileEditFields').style.display='block';
document.getElementById('profileViewFields').style.display='none';
const a=document.getElementById('profileAvatar');
a.onclick=()=>document.getElementById('avatarInput').click();
a.style.background=user.avatar_color;a.style.backgroundImage='';a.textContent=user.username[0].toUpperCase();
if(user.avatar_url){a.style.backgroundImage=`url(${user.avatar_url})`;a.textContent='';}
document.getElementById('profileName').textContent=user.username;
document.getElementById('profileStatus').textContent='';
document.getElementById('profileBio').value=user.bio||'';
document.getElementById('profilePhone').value=user.phone||'';
openModal('profileModal');
}

async function openUserProfile(uid){
try{
const r=await fetch(API+'/api/profile/'+uid,{headers:{'Authorization':'Bearer '+token}});
const d=await r.json();
if(d.user){
document.getElementById('profileModalTitle').textContent='👤 '+d.user.username;
document.getElementById('profileEditFields').style.display='none';
document.getElementById('profileViewFields').style.display='block';
const a=document.getElementById('profileAvatar');a.onclick=null;
a.style.background=d.user.avatar_color;a.style.backgroundImage='';a.textContent=d.user.username[0].toUpperCase();
if(d.user.avatar_url){a.style.backgroundImage=`url(${d.user.avatar_url})`;a.textContent='';}
document.getElementById('profileName').textContent=d.user.username;
document.getElementById('profileStatus').textContent=onlineUsers.has(d.user.id)?'🟢 В сети':'⚫ Не в сети';
document.getElementById('profileBioView').textContent=d.user.bio||'Нет описания';
document.getElementById('profileViewFields').dataset.uid=d.user.id;
openModal('profileModal');
}
}catch(e){}
}

function startChatWithProfile(){
const uid=parseInt(document.getElementById('profileViewFields').dataset.uid);
if(uid){closeModal('profileModal');selectUser({id:uid,username:document.getElementById('profileName').textContent,avatar_color:'#00d4ff',avatar_url:''});}
}

async function saveProfile(){
const bio=document.getElementById('profileBio').value.trim(),phone=document.getElementById('profilePhone').value.trim();
await fetch(API+'/api/profile',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({bio,phone})});
user.bio=bio;user.phone=phone;localStorage.setItem('user',JSON.stringify(user));closeModal('profileModal');
}

async function openChatProfile(){
if(!selChat)return;
if(selChat.type==='user'){openUserProfile(selChat.id);return;}
try{
const r=await fetch(API+'/api/chat/'+selChat.id,{headers:{'Authorization':'Bearer '+token}});
const d=await r.json();
document.getElementById('chatProfileTitle').textContent='📱 '+d.chat.name;
document.getElementById('chatProfileAvatar').style.background=d.chat.avatar_color;
document.getElementById('chatProfileAvatar').style.backgroundImage='';
document.getElementById('chatProfileAvatar').textContent=d.chat.name[0].toUpperCase();
document.getElementById('chatProfileName').textContent=d.chat.name;
document.getElementById('chatProfileDesc').textContent=(d.chat.type==='channel'?'📢 Канал · ':'👥 Группа · ')+d.members.length+' участников';
document.getElementById('chatInviteCode').textContent=d.chat.invite_code?'🔗 Код: '+d.chat.invite_code:'';
const list=document.getElementById('chatMembersList');list.innerHTML='';
const isOwner=d.chat.created_by===user.id;

d.members.forEach(m=>{
const item=document.createElement('div');item.className='memberItem';
let roleHtml='';
if(m.id===d.chat.created_by)roleHtml='<span class="roleBadge owner">Создатель</span>';
else if(m.role==='admin')roleHtml='<span class="roleBadge admin">Админ</span>';
item.innerHTML=`<div class="memberLeft"><div class="avatar" style="width:36px;height:36px;font-size:14px;background:${m.avatar_color};${m.avatar_url?'background-image:url('+m.avatar_url+');background-size:cover':''}">${m.avatar_url?'':m.username[0].toUpperCase()}</div><div><div class="memberName">${m.username}</div><div class="memberRole">${roleHtml||'Участник'}</div></div></div>`;
if(isOwner&&m.id!==user.id){
const btn=document.createElement('button');btn.className='btn small danger';btn.textContent='Удалить';btn.style.width='auto';
btn.onclick=async(e)=>{e.stopPropagation();await removeMember(selChat.id,m.id);};
item.appendChild(btn);
}
item.onclick=()=>{if(m.id!==user.id){closeModal('chatProfileModal');openUserProfile(m.id);}};
list.appendChild(item);
});
document.getElementById('leaveChatBtn').style.display=isOwner?'none':'block';
openModal('chatProfileModal');
}catch(e){}
}

async function removeMember(chatId,userId){
if(!confirm('Удалить участника?'))return;
await fetch(API+'/api/chat/'+chatId+'/remove',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({user_id:userId})});
openChatProfile();
}

async function leaveChat(){
if(!selChat||!confirm('Выйти из чата?'))return;
await fetch(API+'/api/chat/'+selChat.id+'/leave',{method:'POST',headers:{'Authorization':'Bearer '+token}});
closeModal('chatProfileModal');selChat=null;document.getElementById('noChat').style.display='flex';document.getElementById('chatArea').style.display='none';loadChats();
}

async function createChat(){
const name=document.getElementById('chatNameInp').value.trim(),priv=document.getElementById('chatPrivate').checked;
if(!name)return alert('Введите название');
const res=await fetch(API+'/api/chats/create',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({name,type:'group',is_private:priv})});
const c=await res.json();
if(c.invite_code){document.getElementById('inviteCode').textContent='🔗 Код: '+c.invite_code;document.getElementById('inviteCode').style.display='block';}
loadChats();setTimeout(()=>closeModal('createChatModal'),2000);
}

async function joinChat(){
const code=document.getElementById('inviteCodeInp').value.trim();
if(!code)return alert('Введите код');
const res=await fetch(API+'/api/chats/join',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({invite_code:code})});
if(res.ok){loadChats();closeModal('joinChatModal');}else{alert('Неверный код');}
}

function toggleEmoji(){document.getElementById('emojiPick').classList.toggle('show');document.getElementById('attachMenu').classList.remove('show');}
function toggleAttach(){document.getElementById('attachMenu').classList.toggle('show');document.getElementById('emojiPick').classList.remove('show');}
function hideMenus(){document.getElementById('emojiPick').classList.remove('show');document.getElementById('attachMenu').classList.remove('show');}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modalOver').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');}));
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('show');}
function scrollBottom(){const c=document.getElementById('msgsContainer');if(c)c.scrollTop=c.scrollHeight;}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function logout(){if(socket)socket.disconnect();localStorage.clear();location.reload();}

window.addEventListener('load',()=>{if(token&&user)initApp();});
</script>
